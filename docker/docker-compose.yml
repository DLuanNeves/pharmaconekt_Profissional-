version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: pharmaconekt
      POSTGRES_USER: pharmaconekt_user
      POSTGRES_PASSWORD: pharmaconekt_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      DATABASE_URL: postgresql://pharmaconekt_user:pharmaconekt_pass@db/pharmaconekt
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      SECRET_KEY: ${SECRET_KEY}
    ports:
      - "5000:5000"
    depends_on:
      - db

  frontend:
    image: nginx:alpine
    volumes:
      - ./frontend:/usr/share/nginx/html
    ports:
      - "80:80"

volumes:
  postgres_data:
